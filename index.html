<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ứng Dụng Xem Video 360°</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Nút yêu cầu kích hoạt dành riêng cho thiết bị iOS */
        #start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            padding: 15px 30px;
            background-color: #222;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <button id="start-btn">CHẠM ĐỂ XEM VIDEO 360°</button>

    <a-scene vr-mode-ui="enabled: false">
        
        <a-assets>
            <video id="video360" 
                   src="video_cua_ban.mp4" 
                   autoplay 
                   loop 
                   muted 
                   playsinline 
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-videosphere src="#video360" rotation="0 -90 0"></a-videosphere>

        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-entity>

    </a-scene>

    <script>
        const video = document.getElementById('video360');
        const btn = document.getElementById('start-btn');

        // Hàm xử lý kích hoạt phát video và bật tiếng
        function startApp() {
            btn.style.display = 'none';
            video.play();
            video.muted = false; // Bỏ tắt tiếng sau khi người dùng click tương tác
        }

        // Cơ chế xin quyền cảm biến đặc thù cho iOS (iPhone/iPad từ iOS 13+)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            btn.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startApp();
                        } else {
                            alert('Bạn đã từ chối quyền cảm biến. Video sẽ chỉ xem được bằng cách vuốt tay.');
                            startApp();
                        }
                    })
                    .catch(console.error);
            });
        } else {
            // Đối với Android hoặc Máy tính (PC), chỉ cần một cú click bất kỳ là chạy mượt mà
            btn.addEventListener('click', startApp);
        }
    </script>
</body>
</html>
